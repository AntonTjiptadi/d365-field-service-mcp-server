events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Upstream servers
    upstream fastmcp {
        server 127.0.0.1:8000;
    }

    upstream custom_api {
        server 127.0.0.1:8001;
    }

    server {
        listen 8080;
        server_name _;

        # Health check - route to Custom API
        location /health {
            proxy_pass http://custom_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Custom API - route to port 8001
        location /tools/ {
            proxy_pass http://custom_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # FastMCP - route to port 8000
        # Trailing slash version: /mcp/ -> /
        location /mcp/ {
            proxy_pass http://fastmcp/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE-specific headers
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }

        # No trailing slash version: /mcp -> /
        location = /mcp {
            proxy_pass http://fastmcp/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE-specific headers
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }

        # Root - info page
        location = / {
            return 200 '{"service":"D365 MCP Server","endpoints":{"/health":"Health check","/tools/call":"Custom API","/mcp":"FastMCP SSE"}}\n';
            add_header Content-Type application/json;
        }
    }
}
